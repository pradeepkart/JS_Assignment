        for(let i=1;i<=num;i++){

        }

    }
    console.log(fact(5));

    //Task 5-
    function largest(a,b,c){
        if(a>=b && a>=c){
            return a;
        }
        else if(b>=a && b>=c){
            return b;
        }
        else{
            return c;
        }
    }
    console.log(largest(10,15,25));

    let arrCount=[1,2,3,4,5,6,7,8];
    function countArr(arrCount){
        let count=0;
        for(let i=0;i<arrCount.length;i++){
            if(i%2==0){
                count++;
            }
        }
        return count;
    }
    console.log(countArr(arrCount));

  function arrAvg(arr){
    let sum=0;
    for(let i=0;i<arr.length;i++){
